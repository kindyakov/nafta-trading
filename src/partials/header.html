<header class="header {{ header_class }}" data-header>
  <div class="header__container container">
    <div class="header__content">
      <a class="header__logo" href="/" aria-label="Nafta Trading">
        <img src="../assets/images/header-logo-index.png" alt="Лого">
        <!-- header-logo-dark.png -->
      </a>

      <div class="header__toolbar">
        <div class="header__lang" data-da=".header__menu-body, 1150, first">
          <select class="header__lang-select" name="lang" aria-label="Язык">
            <option value="en">EN</option>
            <option value="ru">RU</option>
          </select>
          <span class="header__lang-arrow">
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </span>
        </div>
        <a href="/catalog" class="header__catalog-link button" data-da=".header__menu-nav, 1150, 1">
          Каталог продукции
        </a>
      </div>

      <div class="header__block-right">
        <a href="tel:+79999999999" class="header__phone button" data-da=".header__menu-contacts, 1150, first">
          8 999 999 99 99
        </a>
        <button class="header__cta button" data-da=".header__menu-contacts, 1150, last">
          Свяжитесь с нами
        </button>
        <button class="header__burger" aria-label="Открыть меню" data-burger>
          <span class="header__burger-line"></span>
          <span class="header__burger-line"></span>
          <span class="header__burger-line"></span>
        </button>
      </div>
    </div>
  </div>

  <div class="header__menu" data-menu>
    <div class="header__menu-backdrop" data-menu-close></div>
    <div class="header__menu-content">
      <div class="header__menu-header">
        <a class="header__menu-logo" href="/" aria-label="Nafta Trading">
          <img src="../assets/images/header-logo-index.png" alt="Лого">
        </a>
        <button class="header__menu-close" aria-label="Закрыть меню" data-menu-close>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>
      <div class="header__menu-body">
        <nav class="header__menu-nav">
          <a href="/" class="header__menu-link">Главная</a>
          <a href="/about" class="header__menu-link">О компании</a>
          <a href="/contacts" class="header__menu-link">Контакты</a>
        </nav>
        <div class="header__menu-contacts">
        </div>
      </div>
    </div>
  </div>
</header>
